name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build and Test
    # windows-2022 is a Windows Server 2022 runner, which shares the Windows 11 kernel
    # and is the closest GitHub-hosted runner to Windows 11 for x64 workloads.
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          java-version: '22'
          distribution: 'temurin'

      - name: Install Windows SDK 10.0.22621.0
        # The GitHub-hosted windows-2022 runner ships with SDK 10.0.19041.0 pre-installed.
        # The project targets SDK 10.0.22621.0 (Windows 11 22H2), so we install it explicitly.
        shell: pwsh
        run: |
          winget install --id Microsoft.WindowsSDK.10.0.22621 `
            --silent `
            --accept-source-agreements `
            --accept-package-agreements

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build -x test

      - name: Test
        # Some tests that reference hard-coded local paths (e.g. "D:/Windows Kits/10") are
        # expected to fail in this environment.  The WINDOWS_KITS_10_DIR env-var lets the
        # registry-based / fallback discovery logic find the SDK for tests that use it
        # properly.
        env:
          WINDOWS_KITS_10_DIR: C:\Program Files (x86)\Windows Kits\10
        run: ./gradlew test
